<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shield Inspection" />
  <meta name="theme-color" content="#1a1d23" />
  <meta name="description" content="Shield Inspection Services — Professional Home Inspection App for NYS Licensed Inspectors" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet" />

  <title>Shield Inspection Services</title>
  <link rel="stylesheet" href="/index.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <img src="/assets/logo.png" alt="Shield Inspection" class="login-logo" />
      <h1 class="login-title">Shield Inspection</h1>
      <p class="login-subtitle">Sign in to continue</p>
      <div id="login-error" class="login-error"></div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@email.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      </form>
      <div class="login-footer">Shield Inspection Services, Inc. &copy; 2026</div>
    </div>
  </div>

  <div id="app" class="hidden">
    <!-- App Header -->
    <header id="app-header">
      <div class="header-left">
        <button id="btn-menu" class="icon-btn" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <img src="/assets/logo.png" alt="Shield Inspection" class="header-logo" />
        <span class="header-title">Shield Inspection</span>
      </div>
      <div class="header-right">
        <button id="btn-settings" class="icon-btn" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="btn-logout" class="btn-logout">Logout</button>
      </div>
    </header>

    <!-- Side Navigation -->
    <nav id="side-nav" class="side-nav">
      <div class="nav-overlay" id="nav-overlay"></div>
      <div class="nav-panel">
        <div class="nav-header">
          <img src="/assets/logo.png" alt="Shield" class="nav-logo" />
          <h2>Inspection Sections</h2>
        </div>
        <ul id="nav-sections" class="nav-sections"></ul>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content"></main>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- A-Code Picker Modal -->
    <div id="acode-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Insert A-Code Reference</h3>
          <button class="modal-close" id="acode-close">&times;</button>
        </div>
        <input type="search" id="acode-search" class="modal-search" placeholder="Search A-codes..." />
        <div id="acode-list" class="acode-list"></div>
      </div>
    </div>
  </div>

  <script>
    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
